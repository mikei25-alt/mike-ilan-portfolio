# Netlify config — zero extra setup. The site is static at the repo root,
# so a drag-and-drop of this folder or a Git deploy just works.
[build]
  publish = "."
  command = ""   # no build step

# Long-cache the fingerprint-free static assets (fonts, textures, thumbnails).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sensible security headers for a static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
